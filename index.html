<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="description" content="Battle City — a fan tribute to the classic NAMCO arcade tank game." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Battle City</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%; height: 100%;
        background: radial-gradient(ellipse at 50% 30%, #1e1a14 0%, #0a0806 55%, #030303 100%);
        overflow: hidden;
        font-family: 'Press Start 2P', monospace;
      }
      #game-container {
        width: 100%; height: 100%;
        display: flex; align-items: center; justify-content: center;
        position: relative;
      }
      #game-container::before {
        content: 'BATTLE CITY';
        position: absolute;
        top: max(12px, env(safe-area-inset-top, 12px));
        left: 50%;
        transform: translateX(-50%);
        font-size: 8px;
        letter-spacing: 0.35em;
        color: rgba(238, 184, 80, 0.35);
        pointer-events: none;
        z-index: 1;
        white-space: nowrap;
      }
      @media (max-height: 320px) {
        #game-container::before { display: none; }
      }
      body::after {
        content: '';
        pointer-events: none;
        position: fixed;
        inset: 0;
        z-index: 9998;
        background: radial-gradient(ellipse at center, transparent 35%, rgba(0,0,0,0.6) 100%);
      }
      body::before {
        content: '';
        pointer-events: none;
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: repeating-linear-gradient(
          0deg,
          rgba(0, 0, 0, 0.1) 0px,
          rgba(0, 0, 0, 0.1) 1px,
          transparent 1px,
          transparent 3px
        );
        opacity: 0.4;
        animation: scanline-drift 8s linear infinite;
      }
      @keyframes scanline-drift {
        from { background-position: 0 0; }
        to { background-position: 0 12px; }
      }
      @keyframes bezel-glow {
        0%, 100% { box-shadow: 0 0 60px rgba(0,0,0,0.95), 0 0 8px rgba(238,184,80,0.2), inset 0 0 0 2px rgba(255,255,255,0.05); }
        50% { box-shadow: 0 0 70px rgba(0,0,0,0.95), 0 0 18px rgba(238,184,80,0.35), inset 0 0 0 2px rgba(255,255,255,0.08); }
      }
      canvas {
        image-rendering: pixelated;
        image-rendering: -moz-crisp-edges;
        image-rendering: crisp-edges;
        border-radius: 3px;
        animation: bezel-glow 4s ease-in-out infinite;
      }
    </style>
  </head>
  <body>
    <div id="game-container"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
